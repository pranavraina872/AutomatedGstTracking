<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>GST Form</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h3 th:text="${gst.id == null} ? 'Add GST' : 'Edit GST'"></h3>

<form th:action="@{/gst-ui/save}" method="post" th:object="${gst}">

  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label>GSTIN</label>
    <input type="text" th:field="*{gstIn}" class="form-control"/>
  </div>

  <div class="mb-3">
    <label>Amount</label>
    <input type="number" th:field="*{amount}" class="form-control"/>
  </div>

  <div class="mb-3">
    <label>GST %</label>
    <input type="number" th:field="*{gstTaxPercentage}" class="form-control"/>
  </div>

  <div class="mb-3">
    <label>Buyer State Code</label>
    <input type="text" th:field="*{buyerStateCode}" class="form-control"/>
  </div>

  <div class="mb-3">
    <label>Seller State Code</label>
    <input type="text" th:field="*{sellerStateCode}" class="form-control"/>
  </div>

  <button class="btn btn-success">Save</button>
  <a href="/gst-ui" class="btn btn-secondary">Back</a>

</form>

<hr>

<form th:action="@{/gst-ui/validate}" method="post" th:object="${gst}">
  <input type="hidden" th:field="*{id}"/>
  <input type="hidden" th:field="*{gstIn}"/>

  <button class="btn btn-info">Validate & Calculate</button>
</form>

</body>
</html>
