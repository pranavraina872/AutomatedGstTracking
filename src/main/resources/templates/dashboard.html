<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GST Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #6c63ff;
            --accent: #00e5ff;
            --bg-dark: #0f172a;
            --card: rgba(255,255,255,0.08);
            --border: rgba(255,255,255,0.15);
            --text: #e2e8f0;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #020617);
            font-family: "Inter", sans-serif;
            color: var(--text);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-container {
            max-width: 1300px;
            margin: 40px auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00e5ff, #6c63ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* BUTTON */
        .btn-primary {
            background: linear-gradient(135deg, #6c63ff, #00e5ff);
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            color: #fff;
            font-weight: 500;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,229,255,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 0 25px rgba(108,99,255,0.7);
        }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            backdrop-filter: blur(14px);
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }

        /* TABLE */
        table {
            margin: 0;
            color: var(--text);
        }

        thead {
            background: rgba(255,255,255,0.05);
        }

        thead th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 14px;
            color: #94a3b8;
        }

        tbody td {
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        tbody tr {
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background: rgba(0,229,255,0.08);
            transform: scale(1.01);
            box-shadow: 0 0 20px rgba(0,229,255,0.2);
        }

        /* STATUS */
        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .pass {
            background: rgba(0,255,150,0.15);
            color: #00ffa6;
            box-shadow: 0 0 10px rgba(0,255,150,0.4);
        }

        .fail {
            background: rgba(255,80,80,0.15);
            color: #ff4d4d;
            box-shadow: 0 0 10px rgba(255,80,80,0.4);
        }

        /* ACTION BUTTONS */
        .btn-sm {
            border-radius: 8px;
            border: none;
            font-size: 12px;
            padding: 6px 10px;
            transition: 0.25s;
        }

        .btn-warning {
            background: linear-gradient(135deg, #facc15, #f59e0b);
            color: #000;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4d4d, #ff0000);
        }

        .btn-info {
            background: linear-gradient(135deg, #00e5ff, #3b82f6);
        }

        .btn-sm:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .table-responsive {
            border-radius: 16px;
            overflow: hidden;
        }

    </style>
</head>

<body>

<div class="page-container">

    <!-- HEADER -->
    <div class="header">
        <div class="title">GST Dashboard</div>

        <a href="/gst-ui/new" class="btn btn-primary">
            Add Record
        </a>
    </div>

    <!-- TABLE -->
    <div class="card p-3">

        <div class="table-responsive">
            <table class="table align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>GSTIN</th>
                    <th>Amount</th>
                    <th>GST %</th>
                    <th>IGST</th>
                    <th>CGST</th>
                    <th>SGST</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Risk</th>
                    <th>Score</th>
                    <th>Actions</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="g : ${gstList}">

                    <td th:text="${g.id}"></td>
                    <td th:text="${g.gstIn}"></td>
                    <td th:text="${g.amount}"></td>
                    <td th:text="${g.gstTaxPercentage}"></td>

                    <td th:text="${g.igst}"></td>
                    <td th:text="${g.cgst}"></td>
                    <td th:text="${g.sgst}"></td>

                    <td><b th:text="${g.totalAmount}"></b></td>

                    <td>
                        <span th:if="${g.complianceStatus == 'PASS'}"
                              class="status pass">PASS</span>

                        <span th:if="${g.complianceStatus == 'FAIL'}"
                              class="status fail">FAIL</span>
                    </td>

                    <td th:text="${g.riskLevel}"></td>
                    <td th:text="${g.complianceScore}"></td>

                    <td class="d-flex gap-1">

                        <a th:href="@{'/gst-ui/edit/' + ${g.id}}"
                           class="btn btn-warning btn-sm">Edit</a>

                        <a th:href="@{'/gst-ui/delete/' + ${g.id}}"
                           class="btn btn-danger btn-sm">Delete</a>

                        <a th:href="@{'/gst-ui/report/' + ${g.id}}"
                           class="btn btn-info btn-sm">PDF</a>

                    </td>

                </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

</body>
</html>
