<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GST Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 10px; }
    </style>
</head>

<body class="container mt-4">

<h3 class="mb-4">GST Records</h3>

<a href="/gst-ui/new" class="btn btn-primary mb-3">Add New</a>

<div class="card p-3">
    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>GSTIN</th>
            <th>Amount</th>
            <th>GST %</th>
            <th>GST Amount</th>
            <th>Total</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="g : ${gstList}">
            <td th:text="${g.id}"></td>
            <td th:text="${g.gstIn}"></td>
            <td th:text="${g.amount}"></td>
            <td th:text="${g.gstTaxPercentage}"></td>
            <td th:text="${g.gstAmount}"></td>
            <td th:text="${g.totalAmount}"></td>

            <td>
                <a th:href="@{/gst-ui/edit/{id}(id=${g.id})}" class="btn btn-warning btn-sm">Edit</a>
                <a th:href="@{/gst-ui/delete/{id}(id=${g.id})}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
