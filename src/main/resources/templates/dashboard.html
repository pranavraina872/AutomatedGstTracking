<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GST Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f8f9fa; }
        .card { border-radius: 10px; }
    </style>
</head>

<body class="container mt-4">

<!-- ✅ Header + Button -->
<div class="d-flex justify-content-between mb-3">
    <h3>GST Records</h3>

    <a href="/gst-ui/new" class="btn btn-primary">
        ➕ Add New Record
    </a>
</div>

<!-- ✅ Table -->
<div class="card p-3">
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>GSTIN</th>
            <th>Amount</th>
            <th>GST %</th>
            <th>IGST</th>
            <th>CGST</th>
            <th>SGST</th>
            <th>Total</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="g : ${gstList}">
            <td th:text="${g.id}"></td>
            <td th:text="${g.gstIn}"></td>
            <td th:text="${g.amount}"></td>
            <td th:text="${g.gstTaxPercentage}"></td>

            <!-- GST Split -->
            <td th:text="${g.igst}"></td>
            <td th:text="${g.cgst}"></td>
            <td th:text="${g.sgst}"></td>

            <td th:text="${g.totalAmount}"></td>

            <!-- Compliance Status -->
            <td>
                <span th:if="${g.complianceStatus == 'PASS'}"
                      class="badge bg-success">PASS</span>

                <span th:if="${g.complianceStatus == 'FAIL'}"
                      class="badge bg-danger">FAIL</span>
            </td>

            <!-- Actions -->
            <td>
                <a th:href="@{'/gst-ui/edit/' + ${g.id}}" class="btn btn-warning btn-sm">Edit</a>

                <a th:href="@{'/gst-ui/delete/' + ${g.id}}" class="btn btn-danger btn-sm">Delete</a>

                <a th:href="@{'/gst-ui/report/' + ${g.id}}" class="btn btn-info btn-sm">
                    📄 PDF
                </a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
